name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DRIPLIB_BUILD_TESTS=ON -DRIPLIB_BUILD_EXAMPLES=ON -DBUILD_TESTING=ON

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Test
      run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}

  sanitizers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure with UBSan + ASan
      run: |
        cmake -B build-san \
          -DCMAKE_C_FLAGS="-fsanitize=undefined,address -fno-sanitize-recover=undefined -fno-omit-frame-pointer -g -O1" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined,address" \
          -DRIPLIB_BUILD_TESTS=ON \
          -DBUILD_TESTING=ON

    - name: Build (sanitized)
      run: cmake --build build-san

    - name: Test (sanitized)
      env:
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      run: ctest --test-dir build-san --output-on-failure

    - name: Fuzz harness (compile + short run, libFuzzer / clang)
      run: |
        cmake -B build-fuzz \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_C_FLAGS="-fsanitize=fuzzer,address,undefined -g -O1" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=fuzzer,address,undefined" \
          -DRIPLIB_BUILD_TESTS=ON -DRIPLIB_BUILD_FUZZ=ON
        cmake --build build-fuzz --target fuzz_parser
        ./build-fuzz/tests/fuzz_parser -max_total_time=30 -rss_limit_mb=2048

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure with gcov flags
      run: |
        cmake -B build-cov \
          -DCMAKE_C_FLAGS="-fprofile-arcs -ftest-coverage -O0 -g" \
          -DCMAKE_EXE_LINKER_FLAGS="-fprofile-arcs -ftest-coverage" \
          -DRIPLIB_BUILD_TESTS=ON \
          -DBUILD_TESTING=ON

    - name: Build
      run: cmake --build build-cov

    - name: Run tests
      run: ctest --test-dir build-cov --output-on-failure

    - name: Enforce per-file coverage floors
      run: |
        cd build-cov
        # Thresholds set just below current coverage so future commits
        # cannot meaningfully regress.  Bump after intentional gains.
        declare -A floors=(
          [bgi_font]=82
          [drawing]=85
          [rip_icn]=95
          [rip_icons]=80
          [ripscrip]=80
          [ripscrip2]=85
          # Extracted modules (C-002).  Provisional LOW floors (C-015): set
          # below likely coverage so they catch real regressions without
          # false-failing CI before the first green run calibrates them.
          # Tighten to ~(measured - 3) once the actual percentages are known.
          [rip_preproc]=60
          [rip_variables]=35
          [rip_clipboard]=50
        )
        fail=0
        for f in "${!floors[@]}"; do
          out=$(gcov -b -o CMakeFiles/riplib.dir/src CMakeFiles/riplib.dir/src/${f}.c.gcda 2>&1)
          pct=$(echo "$out" | awk -v want="src/${f}.c" '$0 ~ "File.*"want"'\''" {found=1; next} found && /^Lines executed/ {gsub(/[^0-9.]/,"",$2); print $2; exit}')
          floor=${floors[$f]}
          if [ -z "$pct" ]; then
            echo "::error::coverage for $f could not be parsed"
            fail=1
            continue
          fi
          # Integer comparison (truncates the decimal)
          pct_int=${pct%.*}
          if [ "$pct_int" -lt "$floor" ]; then
            echo "::error::$f coverage $pct% < floor $floor%"
            fail=1
          else
            echo "OK  $f $pct% >= $floor%"
          fi
        done
        exit $fail

  embedded-rp2350:
    name: embedded-rp2350 (Pico 2)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Pin the ARM toolchain to a known release rather than whatever
    # `apt` happens to ship today.  Eliminates "passed yesterday, failed
    # today" drift when the Ubuntu runner image is refreshed.  Bump
    # `release:` deliberately when adopting a newer toolchain.
    - name: Install arm-none-eabi-gcc (pinned)
      uses: carlosperate/arm-none-eabi-gcc-action@v1.10.1
      with:
        release: '13.2.Rel1'

    - name: Configure for Raspberry Pi RP2350 (Pico 2) — Cortex-M33 + FPU
      run: |
        cmake -B build-pico2 \
          -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake

    - name: Build the static library (no link — bare-metal target)
      run: cmake --build build-pico2

    - name: Verify the archive exists and contains the expected objects
      run: |
        test -f build-pico2/libriplib.a
        ar t build-pico2/libriplib.a | sort > /tmp/arm-objs.txt
        echo "Objects in libriplib.a (RP2350 build):"
        cat /tmp/arm-objs.txt
        # Sanity check: all twelve compilation units must be there — the ten
        # core units (six original + riplib_version.c from C-005 + rip_preproc.c
        # + rip_variables.c + rip_clipboard.c from C-002) plus the two generated
        # icon-data blobs (C-015, so a dropped data TU fails here rather than at
        # a downstream consumer's link step).
        for f in drawing bgi_font ripscrip ripscrip2 rip_icons rip_icn rip_preproc rip_variables rip_clipboard riplib_version rip_icons_data rip_icns_data; do
          grep -q "${f}.c.obj" /tmp/arm-objs.txt || (echo "::error::missing ${f}.c.obj in RP2350 archive" && exit 1)
        done

    # Per-object size report, sorted largest first.  Informational only
    # for now — track the numbers across runs so that any surprise
    # bloat (e.g. a refactor accidentally inlines a hot function) is
    # visible in CI before it lands.  A future tightening can add a
    # floor check; see audit candidate C-009 in design/decisions.md.
    - name: Per-object size report (RP2350)
      run: |
        echo "=== Per-object size report (arm-none-eabi-size, RP2350) ==="
        printf "%8s %8s %8s %8s  %s\n" text data bss total object
        echo "----------------------------------------------------------"
        mkdir -p /tmp/arm-objs
        ( cd /tmp/arm-objs && ar x ${GITHUB_WORKSPACE}/build-pico2/libriplib.a )
        cd /tmp/arm-objs
        for o in *.obj; do
          line=$(arm-none-eabi-size -d "$o" | tail -1)
          # arm-none-eabi-size dec output: text data bss dec hex filename
          text=$(echo $line | awk '{print $1}')
          data=$(echo $line | awk '{print $2}')
          bss=$(echo  $line | awk '{print $3}')
          total=$(echo $line | awk '{print $4}')
          printf "%8d %8d %8d %8d  %s\n" $text $data $bss $total "$o"
        done | sort -k4 -nr
        echo
        echo "=== Archive total (arm-none-eabi-size --totals) ==="
        arm-none-eabi-size --totals ${GITHUB_WORKSPACE}/build-pico2/libriplib.a | tail -3

  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure with -fanalyzer
      run: cmake -B build-analyzer -DCMAKE_C_FLAGS="-fanalyzer -O1" -DRIPLIB_BUILD_TESTS=ON -DBUILD_TESTING=ON

    - name: Build (any -Wanalyzer-* surfaces here)
      run: cmake --build build-analyzer 2>&1 | tee analyzer.log

    - name: Fail if analyzer warnings
      run: |
        if grep -E '\-Wanalyzer-' analyzer.log; then
          echo "::error::gcc analyzer reported issues"
          exit 1
        fi
